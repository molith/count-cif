<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Harga Penyerahan & Diskon</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --success-color: #10b981;
            --success-hover: #059669;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border-color: #d1d5db;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05), 0 4px 6px rgba(0, 0, 0, 0.02);
        }

        h2 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 25px;
            text-align: center;
            color: var(--text-main);
            border-bottom: 2px solid #f3f4f6;
            padding-bottom: 15px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
        }

        label a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 400;
            font-size: 13px;
            float: right;
        }

        label a:hover {
            text-decoration: underline;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        input[type="number"] {
            flex: 1;
            padding: 10px 14px;
            font-size: 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            outline: none;
            transition: all 0.2s;
            font-family: inherit;
        }

        input[type="number"]:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        .radio-container {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
            background: #f9fafb;
            padding: 12px 15px;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
        }

        .radio-container label {
            display: inline-flex;
            align-items: center;
            margin-bottom: 0;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            gap: 6px;
        }

        input[type="radio"] {
            accent-color: var(--primary-color);
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        #diskon_custom {
            width: 80px;
            flex: none;
            padding: 6px 10px;
            font-size: 14px;
        }

        button {
            font-family: inherit;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-ganti {
            padding: 10px 16px;
            font-size: 14px;
            background-color: #e5e7eb;
            color: #374151;
        }

        .btn-ganti:hover {
            background-color: #d1d5db;
        }

        .btn-hitung {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            background-color: var(--primary-color);
            color: white;
            margin-top: 10px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(37, 99, 235, 0.2);
        }

        .btn-hitung:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-hitung:active {
            transform: translateY(1px);
        }

        .btn-copy {
            padding: 4px 10px;
            font-size: 12px;
            background-color: var(--success-color);
            color: white;
            margin-left: 10px;
            border-radius: 6px;
            vertical-align: middle;
        }

        .btn-copy:hover {
            background-color: var(--success-hover);
        }

        .hint {
            font-size: 13px;
            color: var(--text-muted);
            text-align: center;
            background-color: #f3f4f6;
            padding: 8px;
            border-radius: 6px;
        }

        /* Styling Area Hasil */
        #result-section {
            display: none; 
            margin-top: 25px;
            background-color: #f0fdf4; /* Light green background */
            border: 1px solid #bbf7d0;
            border-left: 5px solid var(--success-color);
            border-radius: 8px;
            padding: 20px;
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px dashed #cbd5e1;
            font-size: 16px;
        }

        .result-row:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .result-label {
            color: #475569;
            font-weight: 500;
        }

        .result-value {
            font-weight: 700;
            color: #0f172a;
            display: flex;
            align-items: center;
        }

        /* Highlight khusus CIF di kotak CIF */
        #cif {
            font-size: 18px;
            font-weight: 600;
            border-color: var(--primary-color);
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Kalkulator Penyerahan & Diskon</h2>

    <div class="form-group">
        <label>Kurs Fiskal USD <a href="https://fiskal.kemenkeu.go.id/informasi-publik/kurs-pajak" target="_blank">Cek Fiskal ↗</a></label>
        <div class="input-group">
            <input type="number" id="kurs" value="17475" step="any">
            <button class="btn-ganti" onclick="hitung()">Ganti USD</button>
        </div>
    </div>

    <div class="form-group">
        <label>Diskon (%)</label>
        <div class="radio-container">
            <label><input type="radio" name="diskon_opt" value="1.5"> 1.5</label>
            <label><input type="radio" name="diskon_opt" value="2.5"> 2.5</label>
            <label><input type="radio" name="diskon_opt" value="3"> 3</label>
            <label><input type="radio" name="diskon_opt" value="5"> 5</label>
            <label><input type="radio" name="diskon_opt" value="8" checked> 8</label>
            <label><input type="radio" name="diskon_opt" value="99"> 99</label>
            
            <label style="margin-left: auto;">
                <input type="radio" name="diskon_opt" value="custom" id="rad_custom"> 
                Lainnya:
            </label>
            <input type="number" id="diskon_custom" value="0" step="any" placeholder="0">
        </div>
    </div>

    <div class="form-group">
        <label>Nilai CIF</label>
        <input type="number" id="cif" step="any" placeholder="Ketik angka CIF di sini..." autofocus>
    </div>

    <button class="btn-hitung" onclick="hitung()">Hitung Sekarang (Enter)</button>
    <div class="hint">💡 Mulai mengetik dari mana saja untuk otomatis mengisi ulang kotak CIF. Tekan Enter untuk hitung.</div>

    <div id="result-section">
        <div class="result-row">
            <span class="result-label">Nilai CIF</span>
            <span class="result-value" id="outCif"></span>
        </div>
        <div class="result-row">
            <span class="result-label">Harga Penyerahan (Rp)</span>
            <span class="result-value">
                <span id="outHarga"></span> 
                <button class="btn-copy" onclick="copyText('outHarga')" title="Copy Harga">COPY</button>
            </span>
        </div>
        <div class="result-row">
            <span class="result-label">Total Diskon (Rp)</span>
            <span class="result-value">
                <span id="outDiskon"></span> 
                <button class="btn-copy" onclick="copyText('outDiskon')" title="Copy Diskon">COPY</button>
            </span>
        </div>
    </div>
</div>

<script>
    // Penanda status apakah hasil kalkulasi sedang aktif tampil di layar
    let isResultShown = false;

    // Logika perhitungan utama
    function hitung() {
        const kurs = parseFloat(document.getElementById('kurs').value) || 0;
        const cif = parseFloat(document.getElementById('cif').value) || 0;
        
        const selectedOpt = document.querySelector('input[name="diskon_opt"]:checked').value;
        let diskon = 0;

        if (selectedOpt === 'custom') {
            diskon = parseFloat(document.getElementById('diskon_custom').value) || 0;
        } else {
            diskon = parseFloat(selectedOpt);
        }

        if (cif === 0) {
            document.getElementById('result-section').style.display = 'none';
            isResultShown = false;
            return;
        }

        const hargaPenyerahan = cif * kurs;
        const nilaiDiskon = hargaPenyerahan * (diskon / 100);

        const formatNumber = (num) => {
            return new Intl.NumberFormat('en-US', { 
                minimumFractionDigits: 2, 
                maximumFractionDigits: 2 
            }).format(num);
        };

        document.getElementById('outCif').innerText = formatNumber(cif);
        document.getElementById('outHarga').innerText = formatNumber(hargaPenyerahan);
        document.getElementById('outDiskon').innerText = formatNumber(nilaiDiskon);

        // Menampilkan area hasil
        document.getElementById('result-section').style.display = 'block';
        isResultShown = true;
    }

    function pilihCustom() {
        document.getElementById('rad_custom').checked = true;
    }

    document.getElementById('diskon_custom').addEventListener('input', pilihCustom);
    document.getElementById('diskon_custom').addEventListener('focus', pilihCustom);

    // FITUR OTOMATISASI DAN PENGOSONGAN KOTAK CIF SEMPURNA
    window.addEventListener('keydown', function(e) {
        const active = document.activeElement;
        
        // JIKA TEKAN ENTER: Jalankan perhitungan
        if (e.key === 'Enter') {
            hitung();
            return;
        }

        // Jangan ganggu jika user memang sedang mengetik di kotak kurs atau diskon custom
        if (active.id === 'kurs' || active.id === 'diskon_custom') {
            return;
        }

        // Deteksi tombol input yang valid (angka, titik, koma, backspace)
        const isValidKey = (e.key >= '0' && e.key <= '9') || e.key === '.' || e.key === ',' || e.key === 'Backspace';

        if (isValidKey) {
            const cifInput = document.getElementById('cif');
            
            // KONDISI 1: Jika hasil perhitungan sebelumnya sedang tampil di layar,
            // artiannya user ingin memulai input perhitungan baru. Bersihkan layar dan kotak input.
            if (isResultShown) {
                cifInput.value = '';
                document.getElementById('result-section').style.display = 'none';
                isResultShown = false;
                cifInput.focus();
            } 
            // KONDISI 2: Jika posisi kursor belum di kotak CIF, otomatis pindahkan dan bersihkan.
            else if (active.id !== 'cif') {
                cifInput.value = '';
                cifInput.focus();
            }
        }
    });

    // Ketika kotak CIF diklik atau difokuskan manual, otomatis blokir seluruh teks agar siap ditimpa
    document.getElementById('cif').addEventListener('focus', function() {
        this.select();
    });

    // Fungsi Tombol Copy
    function copyText(elementId) {
        const textToCopy = document.getElementById(elementId).innerText;
        const rawNumber = textToCopy.replace(/,/g, ''); 

        navigator.clipboard.writeText(rawNumber).then(() => {
            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = "COPIED!";
            btn.style.backgroundColor = "#059669";
            
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.backgroundColor = "";
            }, 1500);

        }).catch(err => {
            alert("Gagal menyalin teks.");
        });
    }
</script>

</body>
</html>
